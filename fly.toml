# fly.toml app configuration file for Amber's Healthcare

app = "ambers-healthcare"
primary_region = "bos"

[build]

[env]
  PORT = "3000"
  DATABASE_PATH = "/data/ambers_healthcare.db"

[[mounts]]
  source = "ambers_healthcare_data"
  destination = "/data"
  initial_size = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]
